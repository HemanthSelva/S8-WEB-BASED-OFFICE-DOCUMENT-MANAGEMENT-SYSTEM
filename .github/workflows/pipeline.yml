name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'
        
    - name: Start Services
      run: docker compose up -d postgres redis minio elasticsearch ganache
      
    - name: Wait for Services
      run: |
        timeout 60s sh -c 'until docker exec intellidocx-postgres pg_isready -U postgres; do sleep 2; done'
        timeout 60s sh -c 'until curl -s http://localhost:9200/_cluster/health; do sleep 5; done'
        timeout 60s sh -c 'until curl -s -X POST -H "Content-Type: application/json" --data "{\"jsonrpc\":\"2.0\",\"method\":\"eth_blockNumber\",\"params\":[],\"id\":1}" http://localhost:8545; do sleep 2; done'
        
    - name: Install Backend Dependencies
      working-directory: ./backend
      run: npm ci
      
    - name: Run Migrations (Test DB)
      working-directory: ./backend
      env:
        DATABASE_URL: postgres://postgres:password@localhost:5432/intellidocx
        DIRECT_URL: postgres://postgres:password@localhost:5432/intellidocx
      run: npx prisma migrate deploy

    - name: Run Tests
      working-directory: ./backend
      env:
        DATABASE_URL: postgres://postgres:password@localhost:5432/intellidocx
        DIRECT_URL: postgres://postgres:password@localhost:5432/intellidocx
        REDIS_URL: redis://localhost:6379
        MINIO_ENDPOINT: localhost
        MINIO_PORT: 9000
        MINIO_ACCESS_KEY: minioadmin
        MINIO_SECRET_KEY: minioadmin
        MINIO_BUCKET_NAME: intellidocx-documents
        ELASTICSEARCH_NODE: http://localhost:9200
        BLOCKCHAIN_RPC_URL: http://localhost:8545
        PRIVATE_KEY: 0xf4c88568fb1acfdb09a2f8e4177a304bac829d15fae31c66a61e9ea368cbd83e
        CONTRACT_ADDRESS: 0xc3c56a7397b9c917fa545c4e6f375d41b24ecdc8
        JWT_ACCESS_SECRET: testsecret
        JWT_REFRESH_SECRET: testsecret
      run: npm test

    - name: Stop Services
      if: always()
      run: docker compose down

  frontend-build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'
        
    - name: Install Frontend Dependencies
      working-directory: ./frontend
      run: npm ci
      
    - name: Build Frontend
      working-directory: ./frontend
      run: npm run build

  docker-build-check:
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
      
    - name: Build Backend Image
      uses: docker/build-push-action@v4
      with:
        context: ./backend
        push: false
        tags: intellidocx/backend:latest
        
    - name: Build Frontend Image
      uses: docker/build-push-action@v4
      with:
        context: ./frontend
        file: ./frontend/Dockerfile.prod
        push: false
        tags: intellidocx/frontend:latest
