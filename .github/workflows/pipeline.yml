name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'
        
    - name: Start Services
      run: docker compose up -d postgres redis minio
      
    - name: Wait for Services
      run: |
        timeout 60s sh -c 'until docker exec intellidocx-postgres pg_isready -U postgres; do sleep 2; done'
        
    - name: Install Backend Dependencies
      working-directory: ./backend
      run: npm ci
      
    - name: Run Migrations (Test DB)
      working-directory: ./backend
      env:
        DATABASE_URL: postgres://postgres:password@localhost:5432/intellidocx
        DIRECT_URL: postgres://postgres:password@localhost:5432/intellidocx
      run: npx prisma migrate deploy

    - name: Run Tests
      working-directory: ./backend
      env:
        DATABASE_URL: postgres://postgres:password@localhost:5432/intellidocx
        DIRECT_URL: postgres://postgres:password@localhost:5432/intellidocx
        REDIS_URL: redis://localhost:6379
        MINIO_ENDPOINT: localhost
        MINIO_PORT: 9000
        MINIO_ACCESS_KEY: minioadmin
        MINIO_SECRET_KEY: minioadmin
        MINIO_BUCKET_NAME: intellidocx-documents
        JWT_ACCESS_SECRET: testsecret
        JWT_REFRESH_SECRET: testsecret
      run: npm test

    - name: Stop Services
      if: always()
      run: docker compose down

  frontend-build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'
        
    - name: Install Frontend Dependencies
      working-directory: ./frontend
      run: npm ci
      
    - name: Build Frontend
      working-directory: ./frontend
      run: npm run build

  docker-build-check:
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
      
    - name: Build Backend Image
      uses: docker/build-push-action@v4
      with:
        context: ./backend
        push: false
        tags: intellidocx/backend:latest
        
    - name: Build Frontend Image
      uses: docker/build-push-action@v4
      with:
        context: ./frontend
        file: ./frontend/Dockerfile.prod
        push: false
        tags: intellidocx/frontend:latest
