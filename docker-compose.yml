version: '3.8'

services:
  # Backend API
  backend:
    build: ./backend
    container_name: intellidocx-backend
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - PORT=5000
      - JWT_SECRET=intellidocx-secret-key
      - JWT_ACCESS_SECRET=intellidocx-secret-key
      - JWT_REFRESH_SECRET=intellidocx-secret-key
      - DATABASE_URL=postgres://postgres:password@postgres:5432/intellidocx
      - DIRECT_URL=postgres://postgres:password@postgres:5432/intellidocx
      - REDIS_URL=redis://redis:6379
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - ELASTICSEARCH_NODE=http://elasticsearch:9200
      - MINIO_ENDPOINT=minio
      - MINIO_PORT=9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_BUCKET_NAME=intellidocx-documents
      - AI_SERVICE_URL=http://ai-service:8000
      - AI_SERVICE_API_KEY=intellidocx-ai-secret-key
      - BLOCKCHAIN_RPC_URL=http://ganache:8545
      - PRIVATE_KEY=0xf4c88568fb1acfdb09a2f8e4177a304bac829d15fae31c66a61e9ea368cbd83e
      - CONTRACT_ADDRESS=0xc3c56a7397b9c917fa545c4e6f375d41b24ecdc8
    command: >
      sh -c "npm install &&
             npx prisma generate &&
             npx prisma migrate deploy &&
             npx prisma db seed &&
             npm run dev"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      elasticsearch:
        condition: service_started
      minio:
        condition: service_started
      ai-service:
        condition: service_started
    volumes:
      - ./backend:/app
      - /app/node_modules

  # AI Service
  ai-service:
    build: ./ai-service
    container_name: intellidocx-ai
    ports:
      - "8000:8000"
    environment:
      - ELASTICSEARCH_NODE=http://elasticsearch:9200
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_BUCKET=intellidocx-documents
      - AI_SERVICE_API_KEY=intellidocx-ai-secret-key
      - GROQ_API_KEY=${GROQ_API_KEY}
    env_file:
      - .env
      - ./ai-service/.env
    depends_on:
      - elasticsearch
      - minio
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./ai-service:/app

  # Frontend (Dev mode)
  frontend:
    build: ./frontend
    container_name: intellidocx-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5000/api
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host

  # Database
  postgres:
    image: postgres:15-alpine
    container_name: intellidocx-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: intellidocx
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # Cache
  redis:
    image: redis:7-alpine
    container_name: intellidocx-redis
    ports:
      - "6379:6379"

  # Search Engine
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: intellidocx-elastic
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elastic_data:/usr/share/elasticsearch/data

  # Object Storage
  minio:
    image: minio/minio
    container_name: intellidocx-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  # Local Blockchain
  ganache:
    image: trufflesuite/ganache-cli:latest
    container_name: intellidocx-ganache
    ports:
      - "8545:8545"

volumes:
  postgres_data:
  elastic_data:
  minio_data:
