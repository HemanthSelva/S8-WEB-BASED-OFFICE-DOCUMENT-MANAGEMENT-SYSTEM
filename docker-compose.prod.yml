version: '3.8'

services:
  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: intellidocx-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - frontend
      - backend
      - ai-service
    networks:
      - intellidocx-network

  # Backend API
  backend:
    build: ./backend
    container_name: intellidocx-backend
    restart: always
    expose:
      - "5000"
    env_file:
      - .env.production
    environment:
      - NODE_ENV=production
    depends_on:
      - postgres
      - redis
      - elasticsearch
      - minio
      - ai-service
    networks:
      - intellidocx-network

  # AI Service
  ai-service:
    build: ./ai-service
    container_name: intellidocx-ai
    restart: always
    expose:
      - "8000"
    env_file:
      - .env.production
    depends_on:
      - elasticsearch
      - minio
    networks:
      - intellidocx-network

  # Frontend (Production Build)
  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: intellidocx-frontend
    restart: always
    expose:
      - "80"
    networks:
      - intellidocx-network

  # Database
  postgres:
    image: postgres:15-alpine
    container_name: intellidocx-postgres
    restart: always
    env_file:
      - .env.production
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - intellidocx-network

  # Cache
  redis:
    image: redis:7-alpine
    container_name: intellidocx-redis
    restart: always
    expose:
      - "6379"
    networks:
      - intellidocx-network

  # Search Engine
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: intellidocx-elastic
    restart: always
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    expose:
      - "9200"
    volumes:
      - elastic_data:/usr/share/elasticsearch/data
    networks:
      - intellidocx-network

  # Object Storage
  minio:
    image: minio/minio
    container_name: intellidocx-minio
    restart: always
    expose:
      - "9000"
      - "9001"
    env_file:
      - .env.production
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - intellidocx-network

  # Local Blockchain (Ganache for demo/dev purposes kept in prod setup as requested, or maybe replace with real node later)
  ganache:
    image: trufflesuite/ganache-cli:latest
    container_name: intellidocx-ganache
    restart: always
    expose:
      - "8545"
    networks:
      - intellidocx-network

networks:
  intellidocx-network:
    driver: bridge

volumes:
  postgres_data:
  elastic_data:
  minio_data:
